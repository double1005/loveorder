<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>收单 · Love Order</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f7f5;--card:#fff;--primary:#A2DEDE;--primary-dark:#8AC8C8;--text:#1c1c1e;--text-sec:#8e8e93;--border:#d5e8e6;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:16px;--radius-sm:10px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
#app{height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden;display:flex;flex-direction:column}
.header{padding:20px 20px 8px;flex-shrink:0;text-align:center}
.header h1{font-size:22px;font-weight:700;letter-spacing:1px}
.header .sub{font-size:13px;color:var(--text-sec);margin-top:2px}
.header .names{margin-top:4px;font-size:14px;color:var(--text-sec)}
.header .names span{color:var(--primary);font-weight:600}
.content{flex:1;overflow-y:auto;padding:0 20px 100px}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-sec)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px;line-height:1.6}
.order-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.order-card .oc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.order-card .oc-time{font-size:13px;color:var(--text-sec)}
.order-card .oc-badge{background:var(--primary);color:#1c1c1e;font-size:11px;font-weight:600;padding:2px 10px;border-radius:100px}
.order-card .oc-items{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.order-card .oc-item{display:flex;align-items:center;gap:8px;font-size:14px}
.order-card .oc-item img{width:32px;height:auto;flex-shrink:0}
.order-card .oc-item span{font-weight:500}
.order-card .oc-item .oc-desc{color:var(--text-sec);font-size:12px}
.order-card .oc-msg{font-size:13px;font-style:italic;color:var(--text-sec);padding:8px 0;border-top:1px solid var(--border);margin-top:6px}
.order-card .oc-msg:empty{display:none}
.clear-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);max-width:440px;width:calc(100% - 40px);display:flex;gap:8px;justify-content:center}
.btn-primary{background:var(--primary);color:#1c1c1e;border:none;border-radius:100px;padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer}
.btn-primary:active{background:var(--primary-dark);transform:scale(.97)}
.btn-secondary{background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:100px;padding:12px 32px;font-size:14px;font-weight:600;cursor:pointer}
.btn-secondary:active{transform:scale(.97)}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.setup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.setup-overlay.active{display:flex}
.setup-modal{background:#fff;border-radius:20px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.15);text-align:center}
.setup-icon{font-size:40px;margin-bottom:8px}
.setup-modal h3{font-size:18px;font-weight:700;margin-bottom:6px}
.setup-desc{font-size:13px;color:#8e8e93;margin-bottom:20px;line-height:1.5}
.setup-field{text-align:left;margin-bottom:14px}
.setup-field label{font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:#1c1c1e}
.setup-field input{width:100%;padding:10px 14px;border:1.5px solid #e5e0dc;border-radius:12px;font-size:14px;outline:none;box-sizing:border-box}
.setup-field input:focus{border-color:#A2DEDE}
.setup-actions{display:flex;gap:10px;margin-top:8px}
.setup-actions .btn-secondary{flex:1;justify-content:center}
.setup-actions .btn-primary{flex:1;justify-content:center}.settings-btn{font-size:16px;cursor:pointer;opacity:.5;transition:opacity .2s;display:inline-block}.settings-btn:hover{opacity:1}#syncStatus{font-size:10px;position:absolute;right:8px;top:50%;transform:translateY(-50%)}</style>
</head>
<body>
<div id="app">
<div class="header">
<div style="font-size:28px;margin-bottom:4px;display:flex;align-items:center;justify-content:center;gap:8px">📬<span class="settings-btn" onclick="showSetupModal()" style="font-size:16px">⚙️</span><span id="syncStatus"></span></div>
<h1>舟舟的收件箱</h1>
<div class="sub">Inbox for Zhouzhou</div>
<div class="names"><span>小九</span> 的心意</div>
</div>
<div class="content" id="content">
<div class="empty-state" id="empty">
<div class="icon">💌</div>
<p>还没有收到小九的点单<br>等 TA 给你下单吧 🌸</p>
</div>
<div id="ordersList"></div>
</div>
<div class="clear-btn" id="clearBtn">
<button class="btn-secondary" onclick="location.reload()">🔄 刷新</button>
<button class="btn-primary" onclick="clearOrders()">清空全部</button>
</div>
</div>
<div id="setupOverlay" class="setup-overlay">
  <div class="setup-modal">
    <div class="setup-icon">🔗</div>
    <h3>配置跨网络同步</h3>
    <p class="setup-desc">配置 GitHub Token 后，小九和舟舟在不同地方也能收发订单</p>
    <div class="setup-field">
      <label>GitHub Token</label>
      <input type="password" id="setupToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    </div>
    <div class="setup-field">
      <label>仓库名</label>
      <input type="text" id="setupRepo" value="double1005/loveorder" placeholder="owner/repo">
    </div>
    <div class="setup-actions">
      <button class="btn-secondary" id="testConnBtn" onclick="testConnection()">测试连接</button>
      <button class="btn-primary" onclick="saveSetup()" style="padding:10px 28px;font-size:14px">保存并同步</button>
      <button class="btn-secondary" onclick="skipSetup()">跳过</button>
    </div>
  </div>
</div>


<script>
// ===== Firebase Config =====
function showSetupModal(){document.getElementById("setupOverlay").classList.add("active")}
function testConnection(){var t=document.getElementById("setupToken").value.trim();var r=document.getElementById("setupRepo").value.trim();var btn=document.getElementById("testConnBtn");if(!t||!r)return;btn.textContent="测试中…";btn.disabled=true;fetch("https://api.github.com/repos/"+r,{headers:{"Authorization":"token "+t}}).then(function(res){if(res.ok){btn.textContent="✅ 连接成功";setTimeout(function(){btn.textContent="测试连接";btn.disabled=false},2000)}else{btn.textContent="❌ 失败: Token或仓库名错误";btn.disabled=false}}).catch(function(){btn.textContent="❌ 网络错误";btn.disabled=false})}
function saveSetup(){var t=document.getElementById("setupToken").value.trim();var r=document.getElementById("setupRepo").value.trim();if(t&&r){localStorage.setItem("gh_token",t);localStorage.setItem("gh_repo",r);localStorage.removeItem("gh_skipped");location.reload()}}
function skipSetup(){localStorage.setItem("gh_skipped","1");document.getElementById("setupOverlay").classList.remove("active")}var GH_TOKEN=localStorage.getItem("gh_token")||"";var GH_REPO=localStorage.getItem("gh_repo")||"double1005/loveorder";

// Load orders from localStorage
function loadOrders() {
  var hasData = false;
  if (GH_TOKEN) {
    var st=document.getElementById("syncStatus");if(st){st.textContent="🔄";st.title="同步中…"};fetch("https://api.github.com/repos/"+GH_REPO+"/issues?labels=loveorder&state=open&sort=created&direction=desc", {
      headers: {"Authorization": "token "+GH_TOKEN}
    }).then(function(r){return r.json()}).then(function(issues){
      if (issues && issues.length > 0) {
        var list = [];
        issues.forEach(function(issue){
          try {
            var data = JSON.parse(issue.body);
            if (data && data.items) {
              list.push({fromGH:true, number:issue.number, items:data.items, msg:data.msg||"", time:data.time||"", date:data.date||issue.created_at});
            } else {
              list.push({fromGH:true, number:issue.number, body:issue.body, time:issue.created_at, date:issue.created_at, items:[{zh:issue.title, desc:issue.body}]});
            }
          } catch(e) {
            list.push({fromGH:true, number:issue.number, body:issue.body, time:issue.created_at, date:issue.created_at, items:[{zh:issue.title, desc:issue.body}]});
          }
        });
        renderOrders(list);
        var st=document.getElementById("syncStatus");if(st){st.textContent="✅";st.title="已连接"};
        hasData = true;
        var stored = JSON.parse(localStorage.getItem("loveOrders")||"[]");
        list.forEach(function(order){
          if (!stored.some(function(s){return s._ghId===order.number})) {
            order._ghId = order.number;
            stored.push(order);
          }
        });
        localStorage.setItem("loveOrders", JSON.stringify(stored));
        issues.forEach(function(issue){
          fetch("https://api.github.com/repos/"+GH_REPO+"/issues/"+issue.number, {
            method:"PATCH",
            headers:{"Authorization":"token "+GH_TOKEN,"Content-Type":"application/json"},
            body:JSON.stringify({state:"closed"})
          });
        });
      }
      var loc = JSON.parse(localStorage.getItem("loveOrders")||"[]");
      /* old filter: var localOnly = loc.filter(function(o){ return !o._ghId; }); */ var localOnly = loc;
      if (localOnly.length > 0 && !hasData) { renderOrders(localOnly); hasData = true; }
      if (!hasData) { document.getElementById("empty").style.display = "block"; }
    }).catch(function(){
      var st=document.getElementById("syncStatus");if(st){st.textContent="⚠️";st.title="同步失败"};
      var orders = JSON.parse(localStorage.getItem("loveOrders") || "[]");
      if (orders.length > 0) { renderOrders(orders); hasData = true; }
      if (!hasData) { document.getElementById("empty").style.display = "block"; }
    });
  } else {
    var orders = JSON.parse(localStorage.getItem("loveOrders") || "[]");
    if (orders.length > 0) { renderOrders(orders); }
    else { document.getElementById("empty").style.display = "block"; }
  }
}
function renderOrders(orders) {
  var el = document.getElementById('ordersList');
  var empty = document.getElementById('empty');
  el.innerHTML = '';
  if (!orders || orders.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  orders.slice().reverse().forEach(function(order, idx) {
    var card = document.createElement('div');
    card.className = 'order-card fade-in';
    var itemsHtml = '';
    if (order.items) {
      order.items.forEach(function(item) {
        var sn = item.img !== undefined ? (item.img < 10 ? '0' + item.img : '' + item.img) : '01';
        itemsHtml += '<div class="oc-item"><img src="outputs/img/sticker-' + sn + '.png"><div><span>' + item.zh + '</span><div class="oc-desc">' + (item.desc||'') + '</div></div></div>';
      });
    } else if (order.body) {
      itemsHtml = '<div class="oc-item" style="white-space:pre-wrap;font-size:14px;color:var(--text)">' + order.body + '</div>';
    }
    var msgHtml = order.msg ? '<div class="oc-msg">💬 "' + order.msg + '"</div>' : '';
    var timeStr = order.time || order.date || '';
    card.innerHTML = '<div class="oc-header"><span class="oc-time">🕐 ' + timeStr + '</span><span class="oc-badge">新</span></div><div class="oc-items">' + itemsHtml + '</div>' + msgHtml;
    el.appendChild(card);
  });
}
function clearOrders() {
  if (confirm('清空全部收单？')) {
    localStorage.removeItem('loveOrders');
    loadOrders();
  }
}
loadOrders();
// Auto refresh every 5 seconds
setInterval(loadOrders, 5000);

// settings button fallback - also bind via querySelector
document.addEventListener("DOMContentLoaded",function(){var sb=document.querySelector(".settings-btn");if(sb){sb.addEventListener("click",showSetupModal)}});
</script>
</body>
</html>
