<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>舟舟的收件箱 · Love Order</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📬</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f7f5;--card:#fff;--primary:#A2DEDE;--primary-dark:#8AC8C8;--primary-dim:rgba(162,222,222,.15);--text:#1c1c1e;--text-sec:#8e8e93;--border:#d5e8e6;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:16px;--radius-sm:10px;--popup-bg:rgba(0,0,0,.45);--safe-b:env(safe-area-inset-bottom,0px)}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
#app{height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden;display:flex;flex-direction:column}

/* ===== Header ===== */
.header{padding:20px 20px 8px;flex-shrink:0;text-align:center;position:relative}
.header h1{font-size:22px;font-weight:700;letter-spacing:1px}
.header .sub{font-size:13px;color:var(--text-sec);margin-top:2px}
.header .to{font-size:13px;color:var(--text-sec);margin-top:2px}
.header .to span{color:var(--primary);font-weight:600}

/* ===== Stats ===== */
.stats{display:flex;gap:6px;padding:8px 20px;flex-shrink:0}
.stats .stat{flex:1;background:var(--card);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;box-shadow:var(--shadow)}
.stats .stat .num{font-size:18px;font-weight:700;color:var(--primary-dark)}
.stats .stat .lbl{font-size:11px;color:var(--text-sec);margin-top:2px}

/* ===== Content ===== */
.content{flex:1;overflow-y:auto;padding:0 20px 120px;-webkit-overflow-scrolling:touch}
.empty-state{text-align:center;padding:80px 20px 40px;color:var(--text-sec)}
.empty-state .icon{font-size:64px;margin-bottom:12px;opacity:.6;display:inline-block;animation:float 3s ease-in-out infinite}
.empty-state p{font-size:14px;line-height:1.6}
.empty-state .sub-text{font-size:12px;color:var(--text-sec);margin-top:6px;opacity:.6}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ===== Order Card ===== */
.order-card{background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.order-card.new-highlight{animation:newGlow 1.2s ease}
@keyframes newGlow{0%{box-shadow:0 0 0 0 var(--primary)}50%{box-shadow:0 0 0 8px var(--primary)}100%{box-shadow:0 0 0 0 var(--primary)}}
.order-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--primary);border-radius:0 2px 2px 0}
.order-card .oc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.order-card .oc-time{font-size:12px;color:var(--text-sec)}
.order-card .oc-badge{background:var(--primary);color:#1c1c1e;font-size:10px;font-weight:600;padding:2px 10px;border-radius:100px}
.order-card .oc-items{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.order-card .oc-item{display:flex;align-items:center;gap:8px;font-size:14px}
.order-card .oc-item img{width:32px;height:auto;flex-shrink:0}
.order-card .oc-item span{font-weight:500}
.order-card .oc-item .oc-desc{color:var(--text-sec);font-size:12px}
.order-card .oc-msg{font-size:13px;font-style:italic;color:var(--text-sec);padding:8px 0 0;border-top:1px solid var(--border);margin-top:6px}
.order-card .oc-msg:empty{display:none}

/* ===== Bottom Actions ===== */
.bottom-actions{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:440px;width:calc(100% - 40px);display:flex;gap:8px;justify-content:center;padding:12px 0 calc(12px + var(--safe-b));background:linear-gradient(transparent,var(--bg) 30%);pointer-events:none}
.bottom-actions > *{pointer-events:auto}
.btn-primary,.btn-secondary{display:inline-flex;align-items:center;gap:4px;border:none;border-radius:100px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s,background .15s}
.btn-primary{background:var(--primary);color:#1c1c1e}
.btn-primary:active{background:var(--primary-dark);transform:scale(.97)}
.btn-secondary{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-secondary:active{background:var(--border);transform:scale(.97)}
.btn-danger{background:#ffe0e0;color:#c00;border:none;border-radius:100px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s}
.btn-danger:active{transform:scale(.97)}

/* ===== Popup Overlay ===== */
.popup-overlay{position:fixed;inset:0;background:var(--popup-bg);z-index:100;display:none;align-items:center;justify-content:center;padding:20px;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
.popup-overlay.show{display:flex;animation:popupIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes popupIn{from{opacity:0}to{opacity:1}}
.popup-card{background:var(--card);border-radius:24px;padding:28px 24px 20px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center;animation:popupCardIn .5s cubic-bezier(.22,1,.36,1)}
@keyframes popupCardIn{from{opacity:0;transform:scale(.82) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.popup-card .popup-icon{font-size:56px;margin-bottom:8px;display:inline-block;animation:popBounce .5s .2s cubic-bezier(.22,1,.36,1) both}
@keyframes popBounce{0%{transform:scale(0) rotate(-15deg);opacity:0}60%{transform:scale(1.15) rotate(3deg);opacity:1}100%{transform:scale(1) rotate(0)}}
.popup-card h2{font-size:20px;font-weight:700;margin-bottom:4px}
.popup-card .popup-sub{font-size:13px;color:var(--text-sec);margin-bottom:12px}
.popup-card .popup-items{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px}
.popup-card .popup-item{display:flex;align-items:center;gap:4px;background:var(--primary-dim);border-radius:100px;padding:4px 12px 4px 6px;font-size:13px}
.popup-card .popup-item img{width:24px;height:auto}
.popup-card .popup-msg{font-size:13px;font-style:italic;color:var(--text-sec);margin-bottom:12px;padding:6px 12px;background:var(--bg);border-radius:var(--radius-sm)}
.popup-card .popup-msg:empty{display:none}
.popup-card .popup-time{font-size:12px;color:var(--text-sec);margin-bottom:16px}
.popup-card .btn-primary{padding:12px 48px;font-size:15px;width:100%}
.popup-card .btn-primary:active{transform:scale(.97)}

/* ===== Connection status ===== */
.conn-status{position:absolute;top:22px;right:20px;width:10px;height:10px;border-radius:50%;background:#ccc;display:inline-block}
.conn-status.connected{background:#34c759;box-shadow:0 0 6px rgba(52,199,89,.4)}
.conn-status.disconnected{background:#ff3b30;box-shadow:0 0 6px rgba(255,59,48,.3)}

/* ===== Confetti particles ===== */
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden}
.confetti{position:absolute;width:8px;height:8px;border-radius:2px;top:-12px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="conn-status" id="connStatus" title="连接状�?></span>
    <div style="font-size:28px;margin-bottom:4px">📬</div>
    <h1>舟舟的收件箱</h1>
    <div class="sub">Inbox for Zhouzhou</div>
    <div class="to">来自 <span>小九</span> 的心�?/div>
  </div>

  <div class="stats" id="stats">
    <div class="stat"><div class="num" id="totalCount">0</div><div class="lbl">全部收单</div></div>
    <div class="stat"><div class="num" id="todayCount">0</div><div class="lbl">今日</div></div>
    <div class="stat"><div class="num" id="lastTime">--</div><div class="lbl">最�?/div></div>
  </div>

  <div class="content" id="content">
    <div class="empty-state" id="empty">
      <div class="icon">💌</div>
      <p>还没收到小九的点�?br>�?TA 给你下单�?🌸</p>
      <div class="sub-text">打开小九的点单页，选点什么发过来 �?/div>
    </div>
    <div id="ordersList"></div>
  </div>

  <div class="bottom-actions" id="bottomBar">
    <button class="btn-secondary" id="refreshBtn">🔄 刷新</button>
    <button class="btn-danger" id="clearBtn">🗑�?清空全部</button>
  </div>
</div>

<!-- ===== Popup Notification ===== -->
<div class="popup-overlay" id="popup">
  <div class="popup-card">
    <div class="popup-icon" id="popupIcon">💝</div>
    <h2 id="popupTitle">收到心意啦！</h2>
    <div class="popup-sub">小九为你点了</div>
    <div class="popup-items" id="popupItems"></div>
    <div class="popup-msg" id="popupMsg"></div>
    <div class="popup-time" id="popupTime"></div>
    <button class="btn-primary" id="popupAccept">❤️ 收下</button>
  </div>
</div>

<!-- ===== Confetti container ===== -->
<div class="confetti-container" id="confetti"></div>

<script>
// ===== GitHub Issues =====
var GH_REPO = "double1005/loveorder";
var GH_TOKEN = localStorage.getItem("gh_token") || "";

// Update connection indicator
var connEl = document.getElementById("connStatus");

// Token configuration - click status to change
function promptToken() {
  var input = window.prompt("\u8bf7\u8f93\u5165 GitHub Personal Access Token\uff08\u9700 repo \u6743\u9650\uff09\uff1a\n\u6ca1\u6709\u7684\u8bdd\u53bb https://github.com/settings/tokens \u521b\u5efa\u4e00\u4e2a", GH_TOKEN || "");
  if (input !== null && input !== "") {
    GH_TOKEN = input;
    localStorage.setItem("gh_token", GH_TOKEN);
  }
}
function setConn(ok) {
  connEl.className = "conn-status " + (ok ? "connected" : "disconnected");
}
if (GH_TOKEN) { setConn(true); } else { setConn(false); }
// Make status clickable to set/change token
connEl.onclick = function() { promptToken(); };
connEl.title = GH_TOKEN ? '已配置' : '点击设置 Token';

// ===== State =====
var allOrders = [];
var seenIds = {};

// ===== Poll GitHub Issues =====
var polling = false;

function fetchOrders() {
  if (!GH_TOKEN) return;
  if (polling) return;
  polling = true;
  
  fetch("https://api.github.com/repos/" + GH_REPO + "/issues?state=all&per_page=50&sort=created&direction=desc&labels=order", {
    headers: {
      "Authorization": "token " + GH_TOKEN,
      "Accept": "application/vnd.github.v3+json"
    }
  }).then(function(r) {
    polling = false;
    if (!r.ok) {
      console.log("[gh] fetch failed:", r.status);
      setConn(false);
      return null;
    }
    setConn(true);
    return r.json();
  }).then(function(issues) {
    if (!issues || issues.length === 0) return;
    
    // Parse ALL issues into orders  
    var freshOrders = [];
    issues.forEach(function(issue) {
      var o = parseIssue(issue);
      if (o) freshOrders.push(o);
    });
    
    if (freshOrders.length === 0) return;
    
    // Initialize on first load
    if (allOrders.length === 0) {
      allOrders = freshOrders;
      freshOrders.forEach(function(o) { seenIds[o.id] = true; });
      renderAll();
      return;
    }
    
    // Check for new orders
    var newCount = 0;
    freshOrders.forEach(function(order) {
      if (!seenIds[order.id]) {
        seenIds[order.id] = true;
        allOrders.push(order);
        newCount++;
        showPopup(order);
        playAlert();
        fireConfetti();
      }
    });
    
    if (newCount > 0) {
      renderAll();
    }
  }).catch(function(e) {
    polling = false;
    console.log("[gh] error:", e);
    setConn(false);
  });
}

function parseIssue(issue) {
  try {
    var body = issue.body || "";
    var lines = body.split("\n");
    var items = [];
    var msg = "";
    var time = "";
    var date = "";
    
    lines.forEach(function(line) {
      if (line.startsWith("- ")) {
        var name = line.replace("- ", "").trim();
        var desc = "";
        var idx1 = name.indexOf("(");
        var idx2 = name.lastIndexOf(")");
        if (idx1 > 0 && idx2 > idx1) {
          desc = name.substring(idx1 + 1, idx2);
          name = name.substring(0, idx1).trim();
        }
        items.push({ zh: name, desc: desc, img: 1 });
      } else if (line.startsWith("留言：")) {
        msg = line.replace("留言：", "").trim();
      } else if (line.startsWith("时间：")) {
        time = line.replace("时间：", "").trim();
      } else if (line.startsWith("日期：")) {
        date = line.replace("日期：", "").trim();
      }
    });
    
    if (items.length === 0) return null;
    
    // Map items to menu data for proper images
    var menuItems = [
      {zh:"看电影",img:2},{zh:"游戏",img:3},{zh:"连麦",img:4},{zh:"听歌",img:5},
      {zh:"写点东西",img:6},{zh:"催我睡觉",img:7},{zh:"发条语音",img:8},{zh:"哄睡",img:9},
      {zh:"亲亲",img:10},{zh:"报备",img:11},{zh:"夸夸我",img:13},{zh:"说点好听的",img:14},
      {zh:"我想你",img:23},{zh:"寄礼物",img:15},{zh:"寄信",img:16},{zh:"打给我",img:17},
      {zh:"特殊的日子",img:18},{zh:"计划见面",img:19},{zh:"聊以后",img:20},{zh:"列清单",img:21},
      {zh:"等你",img:22}
    ];
    items = items.map(function(item) {
      for (var i = 0; i < menuItems.length; i++) {
        if (menuItems[i].zh === item.zh) {
          return { zh: item.zh, desc: item.desc || menuItems[i].desc || "", img: menuItems[i].img };
        }
      }
      return item;
    });
    
    return {
      id: "gh-" + issue.id,
      items: items,
      msg: msg,
      time: time,
      date: date,
      receivedAt: issue.created_at,
      issueNumber: issue.number
    };
  } catch(e) {
    console.log("[gh] parse error:", e);
    return null;
  }
}

// ===== Render =====
function renderAll() {
  var el = document.getElementById("ordersList");
  var empty = document.getElementById("empty");
  el.innerHTML = "";
  
  if (!allOrders || allOrders.length === 0) {
    empty.style.display = "block";
    document.getElementById("totalCount").textContent = "0";
    document.getElementById("todayCount").textContent = "0";
    document.getElementById("lastTime").textContent = "--";
    return;
  }
  empty.style.display = "none";
  
  document.getElementById("totalCount").textContent = allOrders.length;
  var today = new Date().toDateString();
  var todayOrders = allOrders.filter(function(o) {
    var d = new Date(o.receivedAt || o.date);
    return !isNaN(d.getTime()) && d.toDateString() === today;
  });
  document.getElementById("todayCount").textContent = todayOrders.length;
  var latest = allOrders[allOrders.length - 1];
  var lt = new Date(latest.receivedAt || latest.date || latest.time);
  document.getElementById("lastTime").textContent = !isNaN(lt.getTime()) ? lt.toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit"}) : "--";
  
  var reversed = allOrders.slice().reverse();
  reversed.forEach(function(order) {
    var card = document.createElement("div");
    card.className = "order-card fade-in";
    
    var itemsHtml = "";
    if (order.items) {
      order.items.forEach(function(item) {
        var sn = item.img !== undefined ? (item.img < 10 ? "0" + item.img : "" + item.img) : "01";
        itemsHtml += "<div class=\"oc-item\"><img src=\"outputs/img/sticker-" + sn + ".png\"><div><span>" + (item.zh || "") + "</span><div class=\"oc-desc\">" + (item.desc||"") + "</div></div></div>";
      });
    }
    var msgHtml = order.msg ? "<div class=\"oc-msg\">💬 \u201c" + order.msg + "\u201d</div>" : "";
    var rawTime = order.receivedAt || order.date || order.time || "";
    var d = new Date(rawTime);
    var timeStr = !isNaN(d.getTime()) ? d.toLocaleString("zh-CN", {month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}) : rawTime;
    card.innerHTML = "<div class=\"oc-header\"><span class=\"oc-time\">🕐 " + timeStr + "</span></div><div class=\"oc-items\">" + itemsHtml + "</div>" + msgHtml;
    el.appendChild(card);
  });
}

// ===== Popup =====
function showPopup(order) {
  var iconEmoji = "💌";
  if (order.items && order.items.length > 0) {
    var icons = {10:"😘",11:"📸",14:"💄",2:"🎀",4:"📞",7:"😾",9:"🛌",15:"🎵",19:"✨",3:"🎃",8:"🎙",22:"⏳",23:"💕"};
    iconEmoji = icons[order.items[0].img] || "💌";
  }
  
  document.getElementById("popupIcon").textContent = iconEmoji;
  
  var itemsEl = document.getElementById("popupItems");
  itemsEl.innerHTML = "";
  if (order.items) {
    order.items.forEach(function(item) {
      var sn = item.img !== undefined ? (item.img < 10 ? "0" + item.img : "" + item.img) : "01";
      var div = document.createElement("div");
      div.className = "popup-item";
      div.innerHTML = "<img src=\"outputs/img/sticker-" + sn + ".png\"> " + (item.zh || "");
      itemsEl.appendChild(div);
    });
  }
  
  document.getElementById("popupMsg").textContent = order.msg ? "\u201c" + order.msg + "\u201d" : "";
  
  var rawTime = order.receivedAt || order.date || order.time || "";
  var d = new Date(rawTime);
  var timeStr = isNaN(d.getTime()) ? rawTime : d.toLocaleTimeString("zh-CN", {hour:"2-digit",minute:"2-digit"});
  document.getElementById("popupTime").textContent = "🕐 " + timeStr;
  
  var acceptBtn = document.getElementById("popupAccept");
  var newBtn = acceptBtn.cloneNode(true);
  acceptBtn.parentNode.replaceChild(newBtn, acceptBtn);
  newBtn.addEventListener("click", function() {
    document.getElementById("popup").classList.remove("show");
  });
  
  document.getElementById("popup").classList.add("show");
}

// ===== Confetti =====
function fireConfetti() {
  var container = document.getElementById("confetti");
  var colors = ["#A2DEDE","#FFD1DC","#C7E9C0","#FFD700","#FF9AA2","#B5EAD7","#FFB347","#87CEEB"];
  for (var i = 0; i < 60; i++) {
    var el = document.createElement("div");
    el.className = "confetti";
    el.style.left = Math.random() * 100 + "%";
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 6 + 4) + "px";
    el.style.height = (Math.random() * 6 + 4) + "px";
    el.style.animationDuration = (Math.random() * 2 + 1.5) + "s";
    el.style.animationDelay = (Math.random() * 0.8) + "s";
    el.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
    container.appendChild(el);
    setTimeout(function() { if (el.parentNode) container.removeChild(el); }, 3500);
  }
}

// ===== Alert sound =====
function playAlert() {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    var osc = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.value = 0.08;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e) {}
}

// ===== Clear =====
document.getElementById("clearBtn").addEventListener("click", function() {
  if (allOrders.length === 0) return;
  if (confirm("确认清空全部收单吗？（仅清除本地显示，GitHub Issues 中的记录不受影响）")) {
    allOrders = [];
    seenIds = {};
    renderAll();
  }
});

// ===== Refresh =====
document.getElementById("refreshBtn").addEventListener("click", function() {
  fetchOrders();
  this.textContent = "刷新中...";
  var self = this;
  setTimeout(function() { self.textContent = "🔄 刷新"; }, 1000);
});

// ===== Start polling =====
fetchOrders();
setInterval(fetchOrders, 10000);

console.log("📬 舟舟收件箱已加载");
</script>
</body>
</html>
