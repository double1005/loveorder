<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>情绪点单 · Love Order</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#faf7f5;--card:#fff;--primary:#A2DEDE;--primary-dark:#8AC8C8;--text:#1c1c1e;--text-sec:#8e8e93;--border:#e5e0dc;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:16px;--radius-sm:10px}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text)}
#app{height:100%;max-width:480px;margin:0 auto;position:relative;overflow:hidden}
.page{display:none;height:100%;flex-direction:column;padding:0 20px;overflow-y:auto}
.page.active{display:flex}
#page-home{align-items:center;justify-content:center;text-align:center}
.home-dog{margin-bottom:12px}.home-dog img{width:120px;height:auto}
.home-title{font-size:28px;font-weight:700;letter-spacing:2px}
.home-sub{font-size:14px;color:var(--text-sec);margin:6px 0 32px}
.home-names{font-size:15px;color:var(--text-sec);margin-bottom:24px}
.home-names span{color:var(--primary);font-weight:600}
.btn-primary{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;border:none;border-radius:100px;padding:14px 48px;font-size:17px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(162,222,222,.35)}
.btn-primary:active{background:var(--primary-dark);transform:scale(.97)}
.menu-header{padding:20px 0 8px;display:flex;align-items:center;justify-content:space-between}
.menu-header h2{font-size:18px;font-weight:700}
.menu-header span{font-size:13px;color:var(--text-sec)}
.cats{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto}
.cat-btn{flex-shrink:0;padding:6px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:14px;font-weight:500;cursor:pointer;color:var(--text-sec)}
.cat-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.items-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding-bottom:100px}
.item-card{background:var(--card);border-radius:var(--radius);padding:14px 12px 10px;border:2px solid transparent;cursor:pointer;box-shadow:var(--shadow);text-align:center}
.item-card:active{transform:scale(.96)}
.item-card.selected{border-color:var(--primary)}
.item-card img{width:68px;height:auto;display:block;margin:0 auto 4px}
.item-card .item-name{font-size:14px;font-weight:600}
.item-card .item-desc{font-size:11px;color:var(--text-sec)}
.item-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);display:inline-flex;align-items:center;justify-content:center;margin-top:6px}
.item-card.selected .item-check{border-color:var(--primary);background:var(--primary);color:#fff}
.menu-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:440px;width:calc(100% - 40px);background:var(--card);border-radius:var(--radius) var(--radius) 0 0;box-shadow:0 -2px 16px rgba(0,0,0,.06);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;z-index:10}
.menu-bar .count{font-size:14px;color:var(--text-sec)}
.menu-bar .count strong{color:var(--text)}
.confirm-header{padding:20px 0 8px}.confirm-header h2{font-size:18px;font-weight:700}
.confirm-header .back{font-size:13px;color:var(--primary);cursor:pointer;margin-bottom:4px;display:inline-block}
.selected-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.selected-item{display:flex;align-items:center;gap:10px;background:var(--card);border-radius:var(--radius-sm);padding:10px 12px;box-shadow:var(--shadow)}
.selected-item img{width:40px;height:auto;flex-shrink:0}
.selected-item .si-name{font-size:14px;font-weight:600}
.selected-item .si-cat{font-size:11px;color:var(--text-sec)}
.selected-item .si-remove{background:none;border:none;color:var(--text-sec);font-size:18px;cursor:pointer;margin-left:auto;padding:0 0 0 8px}
.form-group{margin-bottom:14px}
.form-group label{font-size:13px;font-weight:600;margin-bottom:6px;display:block;color:var(--text)}
.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;resize:none;height:60px;font-family:inherit;background:var(--card);outline:none}
.form-group textarea:focus{border-color:var(--primary)}
.time-options{display:flex;gap:8px;flex-wrap:wrap}
.time-opt{padding:8px 18px;border-radius:100px;border:1.5px solid var(--border);background:var(--card);font-size:13px;cursor:pointer;color:var(--text-sec)}
.time-opt.active{border-color:var(--primary);background:rgba(162,222,222,.1);color:var(--primary);font-weight:600}
.confirm-submit{margin:18px 0 40px;text-align:center}
#page-result{align-items:center;justify-content:center;text-align:center}
.result-dog{margin-bottom:8px}.result-dog img{width:100px;height:auto}
.result-title{font-size:22px;font-weight:700;margin-bottom:4px}
.result-list{background:var(--card);border-radius:var(--radius);padding:14px 16px;margin:16px 0;width:100%;box-shadow:var(--shadow);text-align:left}
.result-list .rl-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:14px}
.result-list .rl-item+.rl-item{border-top:1px solid var(--border)}
.result-list .rl-item img{width:28px;height:auto;flex-shrink:0}
.result-msg{font-size:13px;color:var(--text-sec);font-style:italic;margin:4px 0 18px;padding:0 16px}
.result-time{font-size:13px;color:var(--text-sec);margin-bottom:24px}
.result-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-secondary{display:inline-flex;align-items:center;gap:4px;background:var(--card);color:var(--text);border:1.5px solid var(--border);border-radius:100px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer}
.btn-secondary:active{transform:scale(.97)}
.setup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:999;display:none;align-items:center;justify-content:center;padding:20px}
.setup-overlay.active{display:flex}
.setup-modal{background:#fff;border-radius:20px;padding:28px 24px;max-width:360px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.15);text-align:center}
.setup-icon{font-size:40px;margin-bottom:8px}
.setup-modal h3{font-size:18px;font-weight:700;margin-bottom:6px}
.setup-desc{font-size:13px;color:#8e8e93;margin-bottom:20px;line-height:1.5}
.setup-field{text-align:left;margin-bottom:14px}
.setup-field label{font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:#1c1c1e}
.setup-field input{width:100%;padding:10px 14px;border:1.5px solid #e5e0dc;border-radius:12px;font-size:14px;outline:none;box-sizing:border-box}
.setup-field input:focus{border-color:#A2DEDE}
.setup-actions{display:flex;gap:10px;margin-top:8px}
.setup-actions .btn-secondary{flex:1;justify-content:center}
.setup-actions .btn-primary{flex:1;justify-content:center}.settings-btn{font-size:16px;cursor:pointer;opacity:.5;transition:opacity .2s}.settings-btn:hover{opacity:1}</style>
</head><body><div id="app">
<div id="page-home" class="page active">
<div class="home-dog"><img src="outputs/img/sticker-01.png"></div>
<div class="home-title" style="display:flex;align-items:center;justify-content:center;gap:10px">情绪点单<div class="settings-btn" onclick="showSetupModal()">⚙️</div><span id="syncStatus" style="font-size:10px;color:var(--text-sec);margin-left:4px"></span></div>
<div class="home-sub">Love in every form</div>
<div class="home-names"><span>小九</span> → <span>舟舟</span></div>
<button class="btn-primary" onclick="goTo('menu')">点单 ▶</button></div>
<div id="page-menu" class="page">
<div class="menu-header"><h2>想要舟舟做点什么？</h2><span>Order for Zhouzhou</span></div>
<div class="cats" id="catTabs"></div>
<div class="items-grid" id="itemsGrid"></div>
<div class="menu-bar"><span class="count" id="menuCount">已选 <strong>0</strong></span><button class="btn-primary" onclick="confirmOrder()" style="padding:10px 28px;font-size:14px">确认 Next</button></div></div>
<div id="page-confirm" class="page">
<div class="confirm-header"><div class="back" onclick="goTo('menu')">← 返回</div><h2>确认 Confirm</h2></div>
<div class="selected-list" id="selectedList"></div>
<div class="form-group"><label>留句话</label><textarea id="msgInput" placeholder="Say something…" maxlength="200"></textarea></div>
<div class="form-group"><label>什么时候？When?</label><div class="time-options" id="timeOptions"><div class="time-opt" data-val="现在">现在</div><div class="time-opt" data-val="今晚">今晚</div><div class="time-opt" data-val="明早">明早</div><div class="time-opt" data-val="见面时">见面时</div></div></div>
<div class="confirm-submit"><button class="btn-primary" onclick="submitOrder()">下单 Place Order</button></div></div>
<div id="page-result" class="page">
<div class="result-dog" id="resultDog"></div>
<div class="result-title">已下单</div>
<div style="font-size:13px;color:var(--text-sec);margin-bottom:8px">Ordered</div>
<div class="result-list" id="resultList"></div>
<div class="result-msg" id="resultMsg"></div>
<div class="result-time" id="resultTime"></div>
<div class="result-actions">
<button class="btn-primary" onclick="goTo('menu')" style="padding:12px 32px;font-size:15px">再来 Again</button>
<button class="btn-secondary" onclick="goHome()">← 首页 Home</button></div></div></div>
<script>
 function ip(n){var s=n.toString();if(s.length<2)s="0"+s;return "outputs/img/sticker-"+s+".png"}
const MENU={catNames:{zh:["陪伴","关心","萌萌","惊喜","计划"],en:["Be There","Care","Sweet","Surprise","Plan"]},items:[
{cat:0,zh:"看电影",en:"Watch Together",desc:"同时打开，边看边聊",img:2},
{cat:0,zh:"游戏",en:"Game Night",desc:"陪我玩",img:3},
{cat:0,zh:"连麦",en:"Call",desc:"打电话",img:4},
{cat:0,zh:"听歌",en:"Listen Together",desc:"共享歌单",img:5},
{cat:1,zh:"写点东西",en:"Write to Me",desc:"打一段字发过来",img:6},
{cat:1,zh:"催我睡觉",en:"Remind Me",desc:"你知道我总熬夜",img:7},
{cat:1,zh:"发条语音",en:"Voice Note",desc:"想听你声音",img:8},
{cat:1,zh:"哄睡",en:"Tuck Me In",desc:"到我睡着",img:9},
{cat:2,zh:"亲亲",en:"Kiss Me",desc:"啵啵",img:10},
{cat:2,zh:"报备",en:"Selfie",desc:"你在做什么呢",img:11},
{cat:2,zh:"夸夸我",en:"Compliment Me",desc:"你觉得我怎么样",img:13},
 {cat:2,zh:"我想你",en:"Miss You",desc:"你想我吗",img:23},{cat:2,zh:"说点好听的",en:"Sweet Talk",desc:"让我脸红那种",img:14},
{cat:3,zh:"寄礼物",en:"Send a Gift",desc:"拆你挑的快递",img:15},
{cat:3,zh:"寄信",en:"Mail a Letter",desc:"收你写的字",img:16},
{cat:3,zh:"打给我",en:"Call Me",desc:"想打就打",img:17},
{cat:3,zh:"特殊的日子",en:"Remote Birthday",desc:"我们一起",img:18},
{cat:4,zh:"计划见面",en:"Plan the Trip",desc:"倒数的日子",img:19},
{cat:4,zh:"聊以后",en:"Plan Ahead",desc:"幻想以后生活",img:20},
{cat:4,zh:"列清单",en:"Wish List",desc:"见面想做的事",img:21},
{cat:4,zh:"等你",en:"Waiting",desc:"下次见",img:22}
]};
const state={selected:[],activeCat:0,orderMsg:"",orderTime:"现在"};
function showSetupModal(){document.getElementById("setupOverlay").classList.add("active")}
function testConnection(){var t=document.getElementById("setupToken").value.trim();var r=document.getElementById("setupRepo").value.trim();var btn=document.getElementById("testConnBtn");if(!t||!r)return;btn.textContent="测试中…";btn.disabled=true;fetch("https://api.github.com/repos/"+r,{headers:{"Authorization":"token "+t}}).then(function(res){if(res.ok){btn.textContent="连接成功";setTimeout(function(){btn.textContent="测试连接";btn.disabled=false},2000)}else{btn.textContent="失败: Token或仓库名错误";btn.disabled=false}}).catch(function(){btn.textContent="网络错误";btn.disabled=false})}
function saveSetup(){var t=document.getElementById("setupToken").value.trim();var r=document.getElementById("setupRepo").value.trim();if(t&&r){localStorage.setItem("gh_token",t);localStorage.setItem("gh_repo",r);localStorage.removeItem("gh_skipped");location.reload()}}
function skipSetup(){localStorage.setItem("gh_skipped","1");document.getElementById("setupOverlay").classList.remove("active")}var GH_TOKEN=localStorage.getItem("gh_token")||"";var GH_REPO=localStorage.getItem("gh_repo")||"double1005/loveorder";function init(){renderCats();renderItems();renderTimeOpts()}
function renderCats(){const el=document.getElementById("catTabs");el.innerHTML="";const cats=MENU.catNames;cats.zh.forEach((name,i)=>{const btn=document.createElement("div");btn.className="cat-btn"+(i===state.activeCat?" active":"");btn.textContent=name+" "+cats.en[i];btn.onclick=()=>{state.activeCat=i;renderCats();renderItems()};el.appendChild(btn)})}
function renderItems(){const el=document.getElementById("itemsGrid");el.innerHTML="";MENU.items.filter(it=>it.cat===state.activeCat).forEach(item=>{const idx=MENU.items.indexOf(item);const sel=state.selected.includes(idx);const card=document.createElement("div");card.className="item-card"+(sel?" selected":"");card.innerHTML="<img src=\""+ip(item.img)+"\"><div class=\"item-name\">"+item.zh+"</div><div class=\"item-desc\">"+item.desc+"</div><div class=\"item-check\">"+(sel?"✓":"")+"</div>";card.onclick=()=>{const p=state.selected.indexOf(idx);if(p>-1)state.selected.splice(p,1);else state.selected.push(idx);renderItems();updateMenuBar()};el.appendChild(card)});updateMenuBar()}
function updateMenuBar(){document.getElementById("menuCount").innerHTML="已选 <strong>"+state.selected.length+"</strong>"}
function renderTimeOpts(){document.querySelectorAll(".time-opt").forEach(el=>{el.classList.toggle("active",el.dataset.val===state.orderTime);el.onclick=()=>{state.orderTime=el.dataset.val;renderTimeOpts()}})}
function goTo(page){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.getElementById("page-"+page).classList.add("active");if(page==="menu"){renderCats();renderItems()}if(page==="confirm")renderSelected()}
function goHome(){state.selected=[];state.orderMsg="";state.orderTime="现在";document.getElementById("msgInput").value="";goTo("home")}
function confirmOrder(){if(state.selected.length===0)return;goTo("confirm")}
function renderSelected(){const el=document.getElementById("selectedList");el.innerHTML="";state.selected.forEach(idx=>{const item=MENU.items[idx];const div=document.createElement("div");div.className="selected-item";div.innerHTML="<img src=\""+ip(item.img)+"\"><div><div class=\"si-name\">"+item.zh+"</div><div class=\"si-cat\">"+MENU.catNames.en[item.cat]+"</div></div><button class=\"si-remove\" onclick=\"removeSel("+idx+")\">×</button>";el.appendChild(div)})}
function removeSel(idx){const p=state.selected.indexOf(idx);if(p>-1)state.selected.splice(p,1);if(state.selected.length===0)goTo("menu");else renderSelected()}
function submitOrder(){state.orderMsg=document.getElementById("msgInput").value.trim();const items=state.selected.map(idx=>MENU.items[idx]);const el=document.getElementById("resultList");el.innerHTML="";items.forEach(item=>{const div=document.createElement("div");div.className="rl-item";div.innerHTML="<img src=\""+ip(item.img)+"\"><span>"+item.zh+" — "+item.desc+"</span>";el.appendChild(div)});document.getElementById("resultMsg").textContent=state.orderMsg?"\""+state.orderMsg+"\"":"";document.getElementById("resultTime").textContent="🕐 "+state.orderTime;const dog=state.selected.length>0?items[items.length-1]:MENU.items[0];document.getElementById("resultDog").innerHTML="<img src=\""+ip(dog.img)+"\">";goTo("result");saveOrder(items)}function saveOrder(items){var o={items:items,msg:state.orderMsg,time:state.orderTime,date:new Date().toLocaleString()};var r=JSON.parse(localStorage.getItem("loveOrders")||"[]");r.push(o);localStorage.setItem("loveOrders",JSON.stringify(r));if(GH_TOKEN){var orderData={items:items.map(function(it){return{zh:it.zh,desc:it.desc,img:it.img,cat:it.cat}}),msg:state.orderMsg,time:state.orderTime,date:new Date().toLocaleString()};var btn=document.querySelector("#page-result .btn-primary");if(btn){btn.textContent="发送中…";btn.disabled=true}fetch("https://api.github.com/repos/"+GH_REPO+"/issues",{method:"POST",headers:{"Authorization":"token "+GH_TOKEN,"Content-Type":"application/json"},body:JSON.stringify({title:"小九的心意 "+new Date().toLocaleString(),body:JSON.stringify(orderData),labels:["loveorder"]})}).then(function(){if(btn){btn.textContent="✅ 已同步"}setTimeout(function(){if(btn){btn.textContent="再来 Again";btn.disabled=false}},2000)}).catch(function(e){console.error("GitHub sync failed:",e);if(btn){btn.innerHTML="⚠️ 发送失败";btn.disabled=false;setTimeout(function(){btn.textContent="再来 Again"},3000)}})}}
init();
if (!GH_TOKEN && !localStorage.getItem("gh_skipped")) {
  showSetupModal();
}
</script></body></html>
